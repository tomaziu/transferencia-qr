<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QR Code expirado</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body class="mobile">
    <main class="phone-shell">
      <section class="phone-hero">
        <p class="eyebrow">Sessao encerrada</p>
        <h1>QR expirado</h1>
        <p class="lede">Este QR Code nao e mais valido. Atualize a pagina no computador e escaneie o novo codigo.</p>
      </section>

      <section class="send-panel expired-panel">
        <div class="expired-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 8v5"></path>
            <path d="M12 17h.01"></path>
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          </svg>
        </div>
        <strong>Escaneie novamente</strong>
        <p>Isso acontece quando o servidor reinicia, o Render faz novo deploy ou o site fica um tempo sem uso.</p>
        <a class="primary-link" href="/">Abrir tela principal</a>
      </section>
    </main>
  </body>
</html>
