<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Enviar arquivos</title>
    <link rel="stylesheet" href="/assets/styles.css">
    <script src="/assets/send.js" defer></script>
  </head>
  <body class="mobile">
    <main class="phone-shell">
      <section class="phone-hero">
        <p class="eyebrow">Conectado</p>
        <h1>Enviar arquivos</h1>
        <p class="lede">Mantenha esta tela aberta. Se recarregar, selecione o mesmo arquivo para continuar.</p>
      </section>

      <section class="send-panel">
        <div class="picker-grid">
          <label class="file-picker">
            <input id="fileInput" type="file" multiple>
            <span class="file-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
            </span>
            <strong>Selecionar arquivos</strong>
          </label>

          <label class="file-picker" id="folderPicker">
            <input id="folderInput" type="file" webkitdirectory directory multiple>
            <span class="file-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M3 7h6l2 2h10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <path d="M3 7V5a2 2 0 0 1 2-2h4l2 2h4a2 2 0 0 1 2 2"></path>
              </svg>
            </span>
            <strong>Selecionar pasta</strong>
          </label>
        </div>

        <div class="send-actions">
          <button id="sendButton" type="button" class="primary-button" disabled>Enviar</button>
          <button id="stopButton" type="button" class="secondary-button stop-button" hidden>Parar</button>
        </div>

        <div class="queue-summary hidden" id="queueSummary" aria-live="polite">
          <span id="queueStep">0 de 0</span>
          <strong id="queueCurrent">Nenhum arquivo selecionado</strong>
          <p id="queueNext"></p>
        </div>

        <div class="size-advice hidden" id="sizeAdvice" aria-live="polite">
          <strong id="sizeAdviceTitle"></strong>
          <p id="sizeAdviceText"></p>
        </div>

        <div class="resume-advice hidden" id="resumeAdvice" aria-live="polite">
          <strong id="resumeAdviceTitle"></strong>
          <p id="resumeAdviceText"></p>
          <button id="discardResumeButton" type="button" class="secondary-button">Descartar salvo</button>
        </div>

        <div class="queue" id="queue"></div>
      </section>

      <footer class="site-credit">
        Projeto criado por <a href="https://github.com/tomaziu" target="_blank" rel="noreferrer">Tomaziu</a>
      </footer>
    </main>
  </body>
</html>
